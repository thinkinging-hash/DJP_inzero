services:
  - type: web
    name: daesaeng-injaero
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
    disk:
      name: app-data
      mountPath: /opt/render/project/src
      sizeGB: 1
